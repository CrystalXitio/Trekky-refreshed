{% extends "base.html" %}
{% block title %}Create Account — Trekky{% endblock %}

{% block content %}
<div style="background-color: var(--bg-off); min-height: calc(100vh - 80px); display: flex; align-items: center; padding: 3rem 0;">
	<div class="container">
		<div class="row justify-content-center">
			<div class="col-md-10 col-lg-8 col-xl-6">
				<div class="card-trekky">
					<!-- Header -->
					<div class="mb-5">
						<div class="eyebrow">Join Trekky</div>
						<h1 class="display-font" style="font-size: 2rem; margin-bottom: 0.5rem;">Create your account</h1>
						<p style="font-family:'DM Sans',sans-serif; color:var(--muted); font-size:0.95rem; margin:0;">
							Join Trekky to manage itineraries or lead expeditions.
						</p>
					</div>

					<!-- Form -->
					<form method="POST" action="{{ url_for('register') }}" id="register-form">
						<div class="row g-4">
							<div class="col-12">
								<label for="full_name" class="form-label-trekky">Full Name</label>
								<input type="text" class="form-control-trekky" id="full_name" name="full_name"
									required placeholder="E.g., Jane Doe" minlength="2" maxlength="150">
							</div>

							<div class="col-12">
								<label for="email" class="form-label-trekky">Email Address</label>
								<input type="email" class="form-control-trekky" id="email" name="email"
									required placeholder="name@domain.com" autocomplete="email"
									maxlength="255" pattern="^[^@]+@[^@]+\.[^@]+$"
									title="Must be a valid email format like user@domain.com">
							</div>

							<div class="col-md-6">
								<label for="dob" class="form-label-trekky">Date of Birth</label>
								<input type="date" class="form-control-trekky" id="dob" name="dob"
									required max="{{ max_date }}" title="You must be at least 18 years old">
							</div>

							<div class="col-md-6">
								<label for="contact" class="form-label-trekky">Contact Number</label>
								<div class="input-group-trekky d-flex">
									<span class="input-group-text" style="
										font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:600;
										background-color:var(--bg-off); border:1.5px solid var(--border);
										border-right:none; color:var(--muted);
										border-radius:var(--radius-sm) 0 0 var(--radius-sm);
										padding:0.75rem 1rem; white-space:nowrap;">+91</span>
									<input type="tel" class="form-control-trekky" id="contact" name="contact"
										required placeholder="9876543210" pattern="\d{10}"
										title="Must be exactly 10 digits"
										style="border-radius:0 var(--radius-sm) var(--radius-sm) 0 !important;">
								</div>
							</div>

							<div class="col-md-6">
								<label for="password" class="form-label-trekky">Password</label>
								<input type="password" class="form-control-trekky" id="password" name="password"
									required placeholder="••••••••" autocomplete="new-password"
									minlength="8" maxlength="255"
									pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{8,}"
									title="Must contain at least one number, one uppercase, one lowercase letter, one special character, and be at least 8 characters long">
							</div>

							<div class="col-md-6">
								<label for="confirm_password" class="form-label-trekky">Confirm Password</label>
								<input type="password" class="form-control-trekky" id="confirm_password" name="confirm_password"
									required placeholder="••••••••" autocomplete="new-password"
									minlength="8" maxlength="255">
							</div>

							<div class="col-12 mt-2">
								<button type="submit" class="btn-trekky-primary w-100 justify-content-center" id="btn-register-submit"
									style="padding: 0.85rem;">
									Complete Registration
								</button>
							</div>
						</div>
					</form>

					<!-- Footer link -->
					<div class="mt-4 pt-4 text-center" style="border-top: 1px solid var(--border);">
						<p style="font-family:'DM Sans',sans-serif; font-size:0.88rem; color:var(--muted); margin:0;">
							Already have an account?
							<a href="{{ url_for('login') }}" style="color:var(--accent); text-decoration:underline; text-underline-offset:3px; font-weight:600;">
								Sign in here
							</a>
						</p>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
{% endblock %}
