{% extends "base.html" %}
{% block title %}Sign In — Trekky{% endblock %}

{% block content %}
<div style="background-color: var(--bg-off); min-height: calc(100vh - 80px); display: flex; align-items: center; padding: 3rem 0;">
	<div class="container">
		<div class="row justify-content-center">
			<div class="col-md-9 col-lg-7 col-xl-5">
				<div class="card-trekky">
					<!-- Header -->
					<div class="mb-5">
						<div class="eyebrow">Trekky Portal</div>
						<h1 class="display-font" style="font-size: 2rem; margin-bottom: 0.5rem;">Welcome back</h1>
						<p style="font-family:'DM Sans',sans-serif; color:var(--muted); font-size:0.95rem; margin:0;">
							Enter your credentials to access the Trekky system.
						</p>
					</div>

					<!-- Form -->
					<form method="POST" action="{{ url_for('login') }}" id="login-form">
						<div class="mb-4">
							<label for="email" class="form-label-trekky">Email Address</label>
							<input type="email" class="form-control-trekky" id="email" name="email"
								required placeholder="name@domain.com" autocomplete="email">
						</div>
						<div class="mb-5">
							<label for="password" class="form-label-trekky">Password</label>
							<input type="password" class="form-control-trekky" id="password" name="password"
								required placeholder="••••••••" autocomplete="current-password">
						</div>
						<button type="submit" class="btn-trekky-primary w-100 justify-content-center" id="btn-login-submit"
							style="padding: 0.85rem;">
							Authenticate
						</button>
					</form>

					<!-- Footer link -->
					<div class="mt-4 pt-4 text-center" style="border-top: 1px solid var(--border);">
						<p style="font-family:'DM Sans',sans-serif; font-size:0.88rem; color:var(--muted); margin:0;">
							No account yet?
							<a href="{{ url_for('register') }}" style="color:var(--accent); text-decoration:underline; text-underline-offset:3px; font-weight:600;">
								Request access here
							</a>
						</p>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
{% endblock %}
